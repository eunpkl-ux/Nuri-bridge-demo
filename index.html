<script>
    // 1. Make the text change FASTER (every 4 seconds)
    const phrases = [
        "Wonderful sharing, Ji-woo!",
        "Analyzing room acoustics... Clear.",
        "Social interaction detected: Turn-taking.",
        "UCL Fair Demo: Ara is Active.",
        "Engagement levels: High.",
        "New social goal reached!"
    ];
    let phraseIndex = 0;
    
    // This looks for the bubble that says "Wonderful sharing"
    const transcriptElement = document.querySelector('.bg-blue-600.text-white'); 

    setInterval(() => {
        phraseIndex = (phraseIndex + 1) % phrases.length;
        if(transcriptElement) {
            transcriptElement.innerText = `"${phrases[phraseIndex]}"`;
        }
    }, 4000); // 4 seconds makes it feel much more "alive"

    // 2. Keep the percentages drifting
    setInterval(() => {
        const stats = document.querySelectorAll('.text-2xl.font-bold');
        stats.forEach(stat => {
            let current = parseInt(stat.innerText);
            let drift = Math.floor(Math.random() * 3) - 1; 
            if(current > 98) current = 95; // Keep it from going over 100
            stat.innerText = (current + drift) + "%";
        });
    }, 3000);
</script>
