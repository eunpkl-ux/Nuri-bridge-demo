<script>
        const phrases = ["Wonderful sharing, Ji-woo!", "Analyzing social cues...", "Turn-taking detected.", "Engagement: High."];
        let i = 0;
        setInterval(() => {
            const bubble = document.querySelector('.bg-blue-600');
            if(bubble) bubble.innerText = `"${phrases[i++ % phrases.length]}"`;
        }, 4000);

        setInterval(() => {
            document.querySelectorAll('.text-2xl.font-bold').forEach(s => {
                let n = parseInt(s.innerText);
                s.innerText = (n + (Math.random() > 0.5 ? 1 : -1)) + "%";
            });
        }, 3000);
    </script>
</body>
</html>
